name: Flask API CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint with Ruff
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
      
      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install Ruff
        run: python -m pip install ruff==0.15.22

      - name: Run lint checks
        run: ruff check app tests run.py

  test:
    name: Test on Python 3.10
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v6

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Check Python syntax
        run: python -m compileall -q app run.py

      - name: Run unit tests
        run: python -m pytest
  
  docker:
    name: Build Docker image
    needs: [lint, test]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v6

      - name: Build Docker image
        run: docker build --pull --no-cache -t openrouter-flask-api .

      - name: Smoke-test the container
        run: |
          docker run --detach --rm --name resume-reviewer-ci --publish 5000:5000 \
            --env OPENROUTER_MODEL=ci-test-model \
            --env OPENROUTER_BASE_URL=https://openrouter.ai/api/v1 \
            openrouter-flask-api

          for attempt in {1..30}; do
            if curl --fail --silent --show-error http://localhost:5000/health; then
              exit 0
            fi
            sleep 1
          done

          docker logs resume-reviewer-ci
          exit 1

      - name: Stop smoke-test container
        if: always()
        run: docker stop resume-reviewer-ci || true
