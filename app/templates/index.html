<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Resume Reviewer</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 700px;
            margin: 50px auto;
            padding: 20px;
        }

        h1 {
            margin-bottom: 20px;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        textarea {
            resize: vertical;
            min-height: 150px;
            padding: 10px;
        }

        button {
            width: 150px;
            padding: 10px;
            cursor: pointer;
        }

        .response-content {
            margin: 0;
            min-height: 80px;
            padding: 20px 22px;
            color: #1f2937;
            background: #ffffff;
            border: 1px solid #e5e7eb;
            border-radius: 4px 18px 18px 18px;
            box-shadow: 0 2px 8px rgba(15, 23, 42, 0.06);
            font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            font-size: 15px;
            line-height: 1.65;
            word-break: break-word;
        }

        .response-content p {
            margin: 0 0 14px;
        }

        .response-content p:last-child,
        .response-content ul:last-child,
        .response-content ol:last-child {
            margin-bottom: 0;
        }

        .response-content h3,
        .response-content h4 {
            margin: 20px 0 8px;
            color: #111827;
            line-height: 1.35;
        }

        .response-content h3:first-child,
        .response-content h4:first-child {
            margin-top: 0;
        }

        .response-content h3 { font-size: 17px; }
        .response-content h4 { font-size: 15px; }

        .response-content ul,
        .response-content ol {
            margin: 0 0 14px;
            padding-left: 24px;
        }

        .response-content li + li {
            margin-top: 6px;
        }

        .score {
            display: inline-flex;
            align-items: baseline;
            gap: 4px;
            margin: 0 0 18px;
            padding: 10px 14px;
            color: #065f46;
            background: #ecfdf5;
            border-radius: 12px;
        }

        .score strong { font-size: 24px; }

        .response-section {
            margin-top: 36px;
        }

        .response-heading {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 0 0 14px;
            font-size: 18px;
        }

        .assistant-avatar {
            display: grid;
            width: 28px;
            height: 28px;
            place-items: center;
            color: #ffffff;
            background: #10a37f;
            border-radius: 50%;
            font-size: 13px;
            font-weight: 700;
        }

        .response-empty {
            color: #6b7280;
            font-style: italic;
        }
    </style>
</head>
<body>

<h1>AI Resume Reviewer</h1>

<form id="reviewForm">

    <label>
        Resume (PDF / DOCX)
    </label>

    <input
        type="file"
        name="resume"
        accept=".pdf,.docx"
        required
    >

    <label>
        Job Requirement
    </label>

    <textarea
        name="requirement"
        placeholder="Paste job description..."
        required
    ></textarea>

    <button type="submit">
        Review Resume
    </button>

</form>

<section class="response-section" aria-live="polite">
    <h2 class="response-heading">
        <span class="assistant-avatar" aria-hidden="true">AI</span>
        Review Result
    </h2>
    <div id="result" class="response-content response-empty">Your resume review will appear here.</div>
</section>

<script>
const form = document.getElementById("reviewForm");
const result = document.getElementById("result");

function addList(title, items) {
    const heading = document.createElement("h3");
    heading.textContent = title;
    result.appendChild(heading);

    const list = document.createElement("ul");
    items.forEach((item) => {
        const listItem = document.createElement("li");
        listItem.textContent = item;
        list.appendChild(listItem);
    });
    result.appendChild(list);
}

function renderResponse(review) {
    result.replaceChildren();

    const score = document.createElement("p");
    score.className = "score";
    const scoreValue = document.createElement("strong");
    scoreValue.textContent = review.ats_score;
    score.append(scoreValue, document.createTextNode(" / 100 ATS match"));
    result.appendChild(score);

    const summary = document.createElement("p");
    summary.textContent = review.summary;
    result.appendChild(summary);

    addList("Strengths", review.strengths);
    addList("Missing Skills", review.missing_skills);
    addList("Recommendations", review.recommendations);
}

form.addEventListener("submit", async (e) => {

    e.preventDefault();

    const formData = new FormData(form);

    result.classList.remove("response-empty");
    result.textContent = "Reviewing your resume...";

    try {
        const response = await fetch("/review", {
            method: "POST",
            body: formData
        });

        const data = await response.json();
        if (!response.ok || !data.success) {
            throw new Error(data.message || "Review request failed");
        }
        renderResponse(data.data);
    } catch (error) {
        result.textContent = error.message || "Sorry, the review could not be completed. Please try again.";
    }

});
</script>

</body>
</html>
